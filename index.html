<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>tic tac toe</title>
</head>
<body>
    <h1>tic <span class="yellow">tac</span> <span class="blue">toe</span></h1>
    <div class="container"></div>
    <div class="score"></div>
    <div class="turn"></div>
    <div class="startGame"></div>
    
    <dialog id="winnerDialog">
        <div class="dialog">
            <h2 class="winnerName"></h2>
            <button class="continueButton">Play again</button>
        </div>
    </dialog>


    <dialog id="turnDialog">
        <div class="dialog">
            <h2 class="turnName"></h2>
            <button class="playButton">Begin</button>
        </div>
    </dialog>
   
    <script src="script.js"></script>
</body>
</html>
